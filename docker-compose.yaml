services:
  auth_db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    ports:
      - "${AUTH_DB_PORT:-5432}:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - ticket-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  event_db:
    image: postgres:16-alpine
    container_name: event-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: event_db
    ports:
      - "${EVENT_DB_PORT:-5433}:5432"
    volumes:
      - event-db-data:/var/lib/postgresql/data
    networks:
      - ticket-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  booking_db:
    image: postgres:16-alpine
    container_name: booking-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: booking_db
    ports:
      - "${BOOKING_DB_PORT:-5434}:5432"
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    networks:
      - ticket-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory_db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: inventory_db
    ports:
      - "${INVENTORY_DB_PORT:-5435}:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - ticket-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment_db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: payment_db
    ports:
      - "${PAYMENT_DB_PORT:-5436}:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks:
      - ticket-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ticket-system-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ticket-system-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-metadata-quorum.sh --bootstrap-server localhost:9092 describe --status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - ticket-system-network
    depends_on:
      kafka:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-4003}:4003"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4003
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-db:5432/${POSTGRES_DB:-auth_db}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      auth_db:
        condition: service_healthy
    networks:
      - ticket-system-network
    restart: unless-stopped

  event-service:
    build:
      context: .
      dockerfile: services/event-service/Dockerfile
    container_name: event-service
    ports:
      - "${EVENT_SERVICE_PORT:-4004}:4004"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4004
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@event-db:5432/event_db
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      event_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticket-system-network
    restart: unless-stopped

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-4005}:4005"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4005
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@booking-db:5432/booking_db
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      booking_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticket-system-network
    restart: unless-stopped

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT:-4006}:4006"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4006
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@inventory-db:5432/inventory_db
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      inventory_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticket-system-network
    restart: unless-stopped


  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service

    env_file:                              
      - ./services/payment-service/.env

    ports:
      - "${PAYMENT_SERVICE_PORT:-4007}:4007"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4007
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@payment-db:5432/payment_db
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      KAFKA_BROKERS: kafka:9092
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      payment_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticket-system-network
    restart: unless-stopped


  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ticket-system-network
    restart: unless-stopped


  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'



    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/etc/grafana/dashboards/json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ticket-system-network



  loki:
    image: grafana/loki
    container_name: loki
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    networks:
      - ticket-system-network
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./infra/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - ticket-system-network
    restart: unless-stopped

volumes:
  auth-db-data:
  event-db-data:
  booking-db-data:
  inventory-db-data:
  payment-db-data:
  kafka-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  ticket-system-network:
    driver: bridge